<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber-Securiosity | About</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .about-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 40px;
        }
        .profile-img {
            width: 100%;
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .skill-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }
        .skill-bar {
            height: 4px;
            background: #222;
            width: 100%;
            margin-top: 5px;
        }
        .skill-progress {
            height: 100%;
            background: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-cyan);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">⚡ CYBER-SECURIOSITY</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
            <a href="about.html" class="active">About</a>
        </nav>
    </header>

    <div class="container about-layout">
        <div>
            <img src="YOUR_MISO_ABOUT_IMAGE.png" alt="Miso" class="profile-img">
            <div class="card" style="margin-top: 20px; text-align: center;">
                <p style="margin:0; font-size: 0.8rem;">STATUS: <span style="color: #4ade80;">ONLINE</span></p>
            </div>
        </div>

        <div>
            <div class="card">
                <div class="card-title">Background</div>
                <p style="color: var(--text-dim); line-height: 1.6;">
                    Specializing in offensive security and threat hunting. Miso brings a keen eye (and ears) to the digital landscape, identifying vulnerabilities before they become exploits.
                </p>
                
                <div class="card-title" style="margin-top:30px">Technical Skills</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <div class="skill-item"><span>Kali Linux</span><span>90%</span></div>
                        <div class="skill-bar"><div class="skill-progress" style="width: 90%;"></div></div>
                    </div>
                    <div>
                        <div class="skill-item"><span>Python</span><span>75%</span></div>
                        <div class="skill-bar"><div class="skill-progress" style="width: 75%;"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
